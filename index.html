<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Noticias</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  :root {
    --bg:      #0D1117;
    --surface: #161B22;
    --card:    #1C2128;
    --border:  #30363D;
    --accent:  #58A6FF;
    --accent2: #1F6FEB;
    --text:    #E6EDF3;
    --muted:   #7D8590;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    min-height: 100vh;
  }

  /* HEADER */
  header {
    position: sticky; top: 0; z-index: 100;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 12px 16px;
    display: flex; align-items: center; gap: 10px;
  }
  .header-title { font-size: 18px; font-weight: 700; flex: 1; }
  .icon-btn {
    background: var(--card); border: 1px solid var(--border);
    color: var(--accent); border-radius: 8px;
    width: 36px; height: 36px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; cursor: pointer;
  }
  .icon-btn:active { opacity: 0.6; }

  /* BUSCADOR */
  .search-bar {
    display: none; padding: 10px 16px;
    background: var(--surface); border-bottom: 1px solid var(--border);
    gap: 8px; align-items: center;
  }
  .search-bar.visible { display: flex; }
  .search-bar input {
    flex: 1; background: var(--card); border: 1px solid var(--border);
    border-radius: 8px; padding: 9px 14px; color: var(--text); font-size: 14px; outline: none;
  }
  .search-bar input:focus { border-color: var(--accent); }
  .search-bar input::placeholder { color: var(--muted); }
  .search-bar button {
    background: var(--accent2); border: none; color: white;
    border-radius: 8px; padding: 9px 16px; font-size: 14px; font-weight: 600; cursor: pointer;
  }

  /* CHIPS */
  .cat-scroll {
    overflow-x: auto; background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 10px 12px; scrollbar-width: none;
  }
  .cat-scroll::-webkit-scrollbar { display: none; }
  .cat-inner { display: flex; gap: 8px; width: max-content; }
  .chip {
    background: var(--card); border: 1px solid var(--border);
    color: var(--muted); border-radius: 20px;
    padding: 6px 14px; font-size: 12px; font-weight: 500;
    cursor: pointer; white-space: nowrap; user-select: none;
  }
  .chip:active { opacity: 0.6; }
  .chip.active { background: var(--accent2); border-color: var(--accent); color: #fff; }

  /* FEED */
  .feed { padding: 12px 14px 80px; display: flex; flex-direction: column; gap: 10px; }

  /* CARD */
  .card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 12px; padding: 14px;
    animation: fadeUp 0.25s ease both;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .card:nth-child(1)  { animation-delay:.02s } .card:nth-child(2)  { animation-delay:.05s }
  .card:nth-child(3)  { animation-delay:.08s } .card:nth-child(4)  { animation-delay:.11s }
  .card:nth-child(5)  { animation-delay:.14s } .card:nth-child(6)  { animation-delay:.17s }
  .card:nth-child(7)  { animation-delay:.20s } .card:nth-child(8)  { animation-delay:.23s }
  .card:nth-child(9)  { animation-delay:.26s } .card:nth-child(10) { animation-delay:.29s }

  .card-meta { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; gap: 8px; }
  .card-source { font-size: 11px; font-weight: 600; color: var(--accent); text-transform: uppercase; letter-spacing: .5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 55%; }
  .card-date { font-size: 11px; color: var(--muted); white-space: nowrap; }
  .card-img { width: 100%; height: 160px; object-fit: cover; border-radius: 8px; margin-bottom: 10px; background: var(--border); }
  .card-title { font-size: 15px; font-weight: 700; line-height: 1.35; color: var(--text); margin-bottom: 7px; letter-spacing: -.2px; }
  .card-desc { font-size: 13px; color: var(--muted); line-height: 1.5; margin-bottom: 12px; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
  .card-btn {
    display: block; text-align: center;
    background: transparent; border: 1px solid var(--border);
    color: var(--accent); border-radius: 8px; padding: 8px;
    font-size: 13px; font-weight: 600; text-decoration: none;
  }
  .card-btn:active { background: var(--border); }

  /* ESTADOS */
  .state-box { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 60px 20px; gap: 12px; text-align: center; }
  .state-icon { font-size: 40px; }
  .state-msg { font-size: 14px; color: var(--muted); line-height: 1.5; max-width: 260px; }
  .state-btn { background: var(--accent2); border: none; color: white; border-radius: 8px; padding: 10px 24px; font-size: 14px; font-weight: 600; cursor: pointer; margin-top: 4px; }
  .spinner { width: 32px; height: 32px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .count-badge { font-size: 11px; color: var(--muted); padding: 4px 0 2px 2px; }
</style>
</head>
<body>

<header>
  <span style="font-size:22px">📰</span>
  <span class="header-title">Noticias</span>
  <div class="header-actions" style="display:flex;gap:8px">
    <div class="icon-btn" onclick="toggleSearch()">🔍</div>
    <div class="icon-btn" onclick="recargar()">↻</div>
  </div>
</header>

<div class="search-bar" id="searchBar">
  <input type="text" id="searchInput" placeholder="Buscá cualquier tema..." />
  <button onclick="ejecutarBusqueda()">Buscar</button>
</div>

<div class="cat-scroll">
  <div class="cat-inner" id="chips"></div>
</div>

<div class="feed" id="feed"></div>

<script>
const API_KEY = "suCGc21lGiyPuEluSqdBBDlj7kE-wBywwHK7QpfyfD6D3JfS";
const BASE    = "https://api.currentsapi.services/v1/";

// Currents API v2 category taxonomy
const CATS = [
  { id: "",                          label: "🌐 General"        },
  { id: "world",                     label: "🌍 Mundo"           },
  { id: "politics_government",       label: "🏛️ Política"        },
  { id: "economy_business_finance",  label: "💼 Negocios"        },
  { id: "science_technology",        label: "💻 Tecnología"      },
  { id: "arts_culture_entertainment",label: "🎬 Entretenimiento"  },
  { id: "sport",                     label: "⚽ Deportes"        },
  { id: "lifestyle_leisure",         label: "🌿 Lifestyle"       },
  { id: "crime_law_justice",         label: "⚖️ Crimen"          },
];

let catActual = "";
let modoBusqueda = false;

// Chips
const chipsEl = document.getElementById("chips");
CATS.forEach(c => {
  const el = document.createElement("div");
  el.className = "chip" + (c.id === catActual ? " active" : "");
  el.textContent = c.label;
  el.dataset.id = c.id;
  el.onclick = () => seleccionarCat(c.id);
  chipsEl.appendChild(el);
});

function seleccionarCat(id) {
  if (id === catActual && !modoBusqueda) return;
  modoBusqueda = false;
  catActual = id;
  document.querySelectorAll(".chip").forEach(el => el.classList.toggle("active", el.dataset.id === id));
  cerrarSearch();
  cargarNoticias();
}

// Buscador
function toggleSearch() {
  const bar = document.getElementById("searchBar");
  const visible = bar.classList.toggle("visible");
  if (visible) document.getElementById("searchInput").focus();
}
function cerrarSearch() {
  document.getElementById("searchBar").classList.remove("visible");
  document.getElementById("searchInput").value = "";
}
document.getElementById("searchInput").addEventListener("keydown", e => {
  if (e.key === "Enter") ejecutarBusqueda();
});
function ejecutarBusqueda() {
  const q = document.getElementById("searchInput").value.trim();
  if (!q) return;
  modoBusqueda = true;
  document.querySelectorAll(".chip").forEach(el => el.classList.remove("active"));
  buscar(q);
}
function recargar() {
  if (modoBusqueda) {
    const q = document.getElementById("searchInput").value.trim();
    if (q) { buscar(q); return; }
  }
  cargarNoticias();
}

// Fetch noticias
async function cargarNoticias() {
  mostrarLoader();
  // Intentar español primero, luego inglés
  let url = `${BASE}latest-news?language=es&page_size=10&apiKey=${API_KEY}`;
  if (catActual) url += `&category=${catActual}`;

  try {
    let res = await fetch(url);
    let data = await res.json();

    if (!res.ok || !data.news || data.news.length === 0) {
      // fallback inglés
      let url2 = `${BASE}latest-news?language=en&page_size=10&apiKey=${API_KEY}`;
      if (catActual) url2 += `&category=${catActual}`;
      let res2 = await fetch(url2);
      let data2 = await res2.json();
      if (!res2.ok) throw new Error(data2.message || "Error " + res2.status);
      renderNoticias(data2.news || []);
    } else {
      renderNoticias(data.news);
    }
  } catch(e) {
    mostrarError(e.message);
  }
}

async function buscar(q) {
  mostrarLoader();
  const url = `${BASE}search?keywords=${encodeURIComponent(q)}&language=es&page_size=10&apiKey=${API_KEY}`;
  try {
    const res = await fetch(url);
    const data = await res.json();
    if (!res.ok) throw new Error(data.message || "Error " + res.status);
    if (!data.news || data.news.length === 0) {
      mostrarVacio(`Sin resultados para "${q}"`);
      return;
    }
    renderNoticias(data.news);
  } catch(e) {
    mostrarError(e.message);
  }
}

// Render
function renderNoticias(articles) {
  const feed = document.getElementById("feed");
  if (!articles || articles.length === 0) { mostrarVacio("No hay noticias disponibles."); return; }

  feed.innerHTML = `<div class="count-badge">${articles.length} artículos</div>`;

  articles.forEach(art => {
    const card = document.createElement("div");
    card.className = "card";

    const fecha = formatFecha(art.published);
    const fuente = art.author || "Fuente desconocida";

    card.innerHTML = `
      ${art.image && art.image !== "None" ? `<img class="card-img" src="${art.image}" alt="" onerror="this.style.display='none'">` : ""}
      <div class="card-meta">
        <span class="card-source">${escHtml(fuente)}</span>
        <span class="card-date">${fecha}</span>
      </div>
      <div class="card-title">${escHtml(art.title || "")}</div>
      ${art.description ? `<div class="card-desc">${escHtml(art.description)}</div>` : ""}
      <a class="card-btn" href="${art.url}" target="_blank" rel="noopener">Leer nota →</a>
    `;
    feed.appendChild(card);
  });
}

// Estados
function mostrarLoader() {
  document.getElementById("feed").innerHTML = `<div class="state-box"><div class="spinner"></div><div class="state-msg">Cargando noticias...</div></div>`;
}
function mostrarError(msg) {
  document.getElementById("feed").innerHTML = `<div class="state-box"><div class="state-icon">⚠️</div><div class="state-msg">${escHtml(msg)}</div><button class="state-btn" onclick="recargar()">Reintentar</button></div>`;
}
function mostrarVacio(msg) {
  document.getElementById("feed").innerHTML = `<div class="state-box"><div class="state-icon">🔍</div><div class="state-msg">${escHtml(msg)}</div></div>`;
}

// Utils
function formatFecha(str) {
  if (!str) return "";
  try {
    const d = new Date(str);
    const m = ["ene","feb","mar","abr","may","jun","jul","ago","sep","oct","nov","dic"];
    return `${d.getDate()} ${m[d.getMonth()]} ${d.getHours().toString().padStart(2,"0")}:${d.getMinutes().toString().padStart(2,"0")}`;
  } catch(e) { return str.slice(0,10); }
}
function escHtml(s) {
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

cargarNoticias();
</script>
</body>
</html>
